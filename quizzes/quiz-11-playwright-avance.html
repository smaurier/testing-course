<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 11 — Playwright avancé</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 11 — Playwright avancé</h1>
    <p class="subtitle">Page Objects, fixtures, storage state, visual regression et CI</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Page Object Model",
        text: "Quel est l'avantage principal du pattern Page Object en Playwright ?",
        code: "class LoginPage {\n  constructor(private page: Page) {}\n\n  get emailInput() { return this.page.getByLabel('Email'); }\n  get passwordInput() { return this.page.getByLabel('Mot de passe'); }\n  get submitBtn() { return this.page.getByRole('button', { name: 'Connexion' }); }\n\n  async login(email: string, password: string) {\n    await this.emailInput.fill(email);\n    await this.passwordInput.fill(password);\n    await this.submitBtn.click();\n  }\n}",
        options: [
          "Il rend les tests plus rapides a executer",
          "Il encapsule les selecteurs et interactions dans des classes reutilisables, reduisant la duplication et centralisant la maintenance si l'UI change",
          "Il est obligatoire pour utiliser Playwright",
          "Il remplace les fixtures Playwright"
        ],
        answer: 1,
        explanation: "Le Page Object encapsule les details de l'UI (selecteurs, actions) dans une classe. Si un selecteur change, on modifie un seul endroit. Les tests deviennent plus lisibles (loginPage.login('a@b.com', 'pwd')) et moins fragiles."
      },
      {
        label: "Question 2 — Fixtures Playwright",
        text: "A quoi servent les fixtures dans Playwright ?",
        code: "import { test as base } from '@playwright/test';\n\nconst test = base.extend({\n  adminPage: async ({ page }, use) => {\n    await page.goto('/admin/login');\n    await page.getByLabel('Email').fill('admin@test.com');\n    await page.getByLabel('Password').fill('admin123');\n    await page.getByRole('button', { name: 'Login' }).click();\n    await use(page); // le test s'execute ici\n    // teardown apres le test\n  },\n});\n\ntest('admin sees dashboard', async ({ adminPage }) => {\n  await expect(adminPage.getByText('Dashboard')).toBeVisible();\n});",
        options: [
          "Les fixtures sont des fichiers JSON de donnees de test",
          "Elles fournissent un setup/teardown reutilisable qui est injecte dans les tests, avec un cycle de vie automatique (avant/apres le test)",
          "Elles remplacent les Page Objects",
          "Elles ne fonctionnent qu'avec Chrome"
        ],
        answer: 1,
        explanation: "Les fixtures Playwright sont un mecanisme d'injection de dependances : elles encapsulent un setup (ex: login), l'injectent via les parametres du test, et gerent le teardown automatiquement. Chaque test recoit une instance fraiche."
      },
      {
        label: "Question 3 — Storage state",
        text: "Comment le storage state optimise-t-il les tests authentifies ?",
        code: "// global-setup.ts — execute une seule fois\nasync function globalSetup() {\n  const browser = await chromium.launch();\n  const page = await browser.newPage();\n  await page.goto('/login');\n  await page.getByLabel('Email').fill('user@test.com');\n  await page.getByLabel('Password').fill('password');\n  await page.getByRole('button', { name: 'Login' }).click();\n  await page.context().storageState({ path: 'auth.json' });\n}\n\n// playwright.config.ts\nuse: { storageState: 'auth.json' }",
        options: [
          "Il sauvegarde les captures d'ecran pour chaque test",
          "Il sauvegarde les cookies et le localStorage apres un login unique, et les restaure dans chaque test — evitant de se reconnecter a chaque test",
          "Il stocke les resultats des tests precedents",
          "Il est incompatible avec les tests paralleles"
        ],
        answer: 1,
        explanation: "Le storage state capture cookies + localStorage dans un fichier JSON apres un login initial. Chaque test demarre avec cet etat restaure, evitant le login repetitif. Cela accelere significativement les suites de tests authentifies."
      },
      {
        label: "Question 4 — Visual regression",
        text: "Comment fonctionnent les tests de regression visuelle avec Playwright ?",
        code: "test('homepage looks correct', async ({ page }) => {\n  await page.goto('/');\n  await expect(page).toHaveScreenshot('homepage.png', {\n    maxDiffPixelRatio: 0.01,\n  });\n});",
        options: [
          "Ils comparent le code HTML entre deux executions",
          "Ils prennent un screenshot et le comparent pixel par pixel a une reference (baseline), detectant les changements visuels inattendus",
          "Ils verifient uniquement les couleurs CSS",
          "Ils necessitent un service cloud tiers"
        ],
        answer: 1,
        explanation: "toHaveScreenshot() capture un screenshot et le compare a une reference stockee. A la premiere execution, la baseline est creee. Les executions suivantes comparent pixel par pixel. maxDiffPixelRatio tolere de legeres differences (anti-aliasing, rendering)."
      },
      {
        label: "Question 5 — Playwright en CI",
        text: "Quelle bonne pratique est essentielle pour Playwright en CI ?",
        code: "# .github/workflows/e2e.yml\njobs:\n  e2e:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - run: npx playwright install --with-deps\n      - run: npx playwright test\n      - uses: actions/upload-artifact@v4\n        if: failure()\n        with:\n          name: playwright-report\n          path: playwright-report/",
        options: [
          "Executer les tests uniquement en mode headed (avec navigateur visible)",
          "Installer les navigateurs avec --with-deps, utiliser un OS stable (Linux), et uploader les rapports/traces en artifact en cas d'echec pour le debugging",
          "Ne jamais executer de tests E2E en CI car trop lents",
          "Utiliser uniquement Chrome pour reduire le temps d'execution"
        ],
        answer: 1,
        explanation: "En CI : installer les deps systeme (--with-deps), executer en headless sur Linux (le plus rapide et stable), parallleliser avec workers, et surtout uploader les artifacts (report HTML, traces) en cas d'echec pour pouvoir debugger a distance."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
