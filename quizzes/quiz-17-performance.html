<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 17 — Tests de performance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 17 — Tests de performance</h1>
    <p class="subtitle">k6, types de load tests, benchmarks, Web Vitals et memory leaks</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Types de load tests",
        text: "Quelle est la difference entre load test, stress test et spike test ?",
        code: null,
        options: [
          "Ce sont trois noms differents pour la meme chose",
          "Load test : charge normale attendue. Stress test : charge croissante jusqu'au point de rupture. Spike test : pic soudain et bref de trafic",
          "Load test est pour le frontend, stress test pour le backend",
          "Spike test est le plus facile a implementer car il ne dure que quelques secondes"
        ],
        answer: 1,
        explanation: "Load test valide le comportement sous charge normale (ex: 100 users simultanes pendant 10min). Stress test pousse au-dela pour trouver les limites. Spike test simule un pic brutal (ex: 0 a 1000 users en 10s) pour verifier la resilience et l'auto-scaling."
      },
      {
        label: "Question 2 — k6",
        text: "Que fait ce script k6 ?",
        code: "import http from 'k6/http';\nimport { check, sleep } from 'k6';\n\nexport const options = {\n  vus: 50,\n  duration: '2m',\n  thresholds: {\n    http_req_duration: ['p(95)<500'],\n    http_req_failed: ['rate<0.01'],\n  },\n};\n\nexport default function () {\n  const res = http.get('https://api.example.com/users');\n  check(res, {\n    'status is 200': (r) => r.status === 200,\n    'body has users': (r) => r.json().length > 0,\n  });\n  sleep(1);\n}",
        options: [
          "Il deploie l'API sur 50 serveurs pendant 2 minutes",
          "Il simule 50 utilisateurs virtuels pendant 2 minutes, verifiant que 95% des requetes repondent en moins de 500ms et que moins de 1% echouent",
          "Il teste unitairement 50 fonctions de l'API",
          "Il mesure la couverture de code de l'API"
        ],
        answer: 1,
        explanation: "k6 simule 50 VUs (virtual users) qui appellent l'endpoint en boucle pendant 2 minutes. Les thresholds definissent les SLOs : p95 < 500ms et taux d'erreur < 1%. Si un seuil est depasse, k6 retourne un exit code non-zero (echec en CI)."
      },
      {
        label: "Question 3 — Web Vitals",
        text: "Quels sont les trois Core Web Vitals et que mesurent-ils ?",
        code: "// Mesurer les Web Vitals avec Playwright\nconst metrics = await page.evaluate(() => {\n  return new Promise((resolve) => {\n    new PerformanceObserver((list) => {\n      const entries = list.getEntries();\n      resolve(entries);\n    }).observe({ type: 'largest-contentful-paint', buffered: true });\n  });\n});",
        options: [
          "HTML, CSS, JavaScript — les trois langages du web",
          "LCP (Largest Contentful Paint = temps de chargement perçu), FID/INP (Interaction to Next Paint = reactivite), CLS (Cumulative Layout Shift = stabilite visuelle)",
          "CPU, RAM, Disk — les trois ressources systeme",
          "GET, POST, PUT — les trois methodes HTTP"
        ],
        answer: 1,
        explanation: "Les Core Web Vitals de Google mesurent l'experience utilisateur : LCP (< 2.5s) = quand le contenu principal est visible, INP (< 200ms, remplace FID) = temps de reaction aux interactions, CLS (< 0.1) = stabilite du layout. Ils impactent le SEO et l'UX."
      },
      {
        label: "Question 4 — Benchmarks avec vitest",
        text: "Comment Vitest permet-il de benchmarker des fonctions ?",
        code: "import { bench, describe } from 'vitest';\n\ndescribe('sort algorithms', () => {\n  const data = Array.from({ length: 10000 }, () => Math.random());\n\n  bench('Array.sort', () => {\n    [...data].sort((a, b) => a - b);\n  });\n\n  bench('custom quicksort', () => {\n    quickSort([...data]);\n  });\n});",
        options: [
          "bench() est un alias pour test() et ne mesure rien",
          "bench() execute chaque fonction des milliers de fois, mesure le temps moyen, et compare les implementations — detectant les regressions de performance",
          "bench() ne fonctionne qu'avec des fonctions async",
          "Les benchmarks dans les tests sont toujours imprecis et inutiles"
        ],
        answer: 1,
        explanation: "vitest bench execute chaque fonction un grand nombre de fois, calcule ops/sec, moyenne, mediane et ecart-type. C'est ideal pour comparer des implementations, detecter des regressions de performance, et documenter les choix algorithmiques."
      },
      {
        label: "Question 5 — Memory leaks",
        text: "Comment detecter les fuites memoire dans les tests ?",
        code: "test('no memory leak after 1000 operations', () => {\n  const before = process.memoryUsage().heapUsed;\n\n  for (let i = 0; i < 1000; i++) {\n    processData(largeObject);\n  }\n\n  // Force GC (node --expose-gc)\n  if (global.gc) global.gc();\n\n  const after = process.memoryUsage().heapUsed;\n  const growth = after - before;\n  expect(growth).toBeLessThan(10 * 1024 * 1024); // < 10MB\n});",
        options: [
          "Les fuites memoire sont impossibles en JavaScript grace au garbage collector",
          "On mesure la memoire heap avant/apres N operations, force le GC, et verifie que la croissance reste sous un seuil — detectant les references retenues involontairement",
          "Il suffit de verifier que l'application ne crash pas",
          "Les fuites memoire ne se testent qu'en production"
        ],
        answer: 1,
        explanation: "Meme avec GC, les closures, event listeners non retires, caches non bornes et references circulaires causent des fuites. Le pattern : mesurer heap avant, executer N fois, forcer GC, mesurer apres. Si la croissance est lineaire avec N, il y a une fuite."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
