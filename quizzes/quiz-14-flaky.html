<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 14 — Tests flaky</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 14 — Tests flaky</h1>
    <p class="subtitle">Causes, detection, debugging et patterns de correction</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Definition",
        text: "Qu'est-ce qu'un test flaky ?",
        code: null,
        options: [
          "Un test qui echoue systematiquement a chaque execution",
          "Un test qui passe ou echoue de maniere non deterministe sans changement de code, produisant des resultats inconsistants",
          "Un test qui est trop lent a executer",
          "Un test qui ne couvre pas assez de code"
        ],
        answer: 1,
        explanation: "Un test flaky est non deterministe : il peut passer ou echouer sans aucune modification du code. C'est un des problemes les plus nocifs en CI car il erode la confiance dans la suite de tests. Les developpeurs finissent par ignorer les echecs ('c'est juste un flaky')."
      },
      {
        label: "Question 2 — Causes principales",
        text: "Quelle est la cause la plus frequente de tests flaky ?",
        code: "// Exemple de test flaky\ntest('shows notification', async () => {\n  await page.click('#save');\n  // Le toast apparait apres une animation de 300ms\n  const toast = page.locator('.toast');\n  expect(await toast.isVisible()).toBe(true); // FLAKY!\n});",
        options: [
          "Les bugs dans le framework de test lui-meme",
          "Les problemes de timing et de race conditions : le test n'attend pas assez longtemps qu'un element apparaisse, qu'une animation finisse, ou qu'une requete se complete",
          "L'utilisation de TypeScript au lieu de JavaScript",
          "Le nombre de tests dans la suite"
        ],
        answer: 1,
        explanation: "La majorite des tests flaky sont causes par des problemes de timing : checks ponctuels au lieu d'attentes auto-retrying, animations non attendues, requetes reseau non mockees, ou etat partage entre tests. La solution ici : await expect(toast).toBeVisible() (auto-retry)."
      },
      {
        label: "Question 3 — Etat partage",
        text: "Comment l'etat partage entre tests cause-t-il des flaky tests ?",
        code: "// Test A modifie un etat global\ntest('creates user', async () => {\n  await db.insert({ id: 1, name: 'Alice' });\n  expect(await db.count()).toBe(1);\n});\n\n// Test B depend de l'etat initial\ntest('database starts empty', async () => {\n  expect(await db.count()).toBe(0); // FLAKY!\n  // Passe si B s'execute avant A, echoue sinon\n});",
        options: [
          "L'etat partage n'est jamais un probleme en testing",
          "Les tests dependent de l'ordre d'execution : si A s'execute avant B, l'etat est pollue et B echoue. La parallelisation rend l'ordre imprevisible, causant des echecs intermittents",
          "L'etat partage accelere les tests et est recommande",
          "Ce probleme n'existe qu'avec les bases de donnees"
        ],
        answer: 1,
        explanation: "L'etat partage (DB, variables globales, fichiers, singletons) cree des dependances implicites entre tests. En sequentiel, l'ordre masque le probleme. En parallele (ou si l'ordre change), les tests echouent. Solution : isolation via setup/teardown, transactions rollback."
      },
      {
        label: "Question 4 — Detection",
        text: "Comment detecter systematiquement les tests flaky ?",
        code: "# Playwright: repeter chaque test N fois\nnpx playwright test --repeat-each=5\n\n# Vitest: repeter la suite entiere\nvitest --retry 3\n\n# CI: tag et track les flaky tests\ntest.describe('user flow', { tag: '@flaky' }, () => {\n  // ...\n});",
        options: [
          "Les tests flaky se corrigent d'eux-memes avec le temps",
          "Executer les tests plusieurs fois (repeat-each, --retry), monitorer les echecs intermittents en CI, et utiliser des outils de flaky detection qui trackent les resultats au fil du temps",
          "Supprimer tous les tests qui ont echoue au moins une fois",
          "Augmenter les timeouts a 60 secondes pour tous les tests"
        ],
        answer: 1,
        explanation: "Les strategies de detection : 1) --repeat-each=N en CI pour exposer les flaky, 2) Monitorer les retries en CI (un test qui passe au retry est suspect), 3) Outils comme Playwright's --last-failed, 4) Dashboard de flaky rate par test. La detection est la premiere etape avant la correction."
      },
      {
        label: "Question 5 — Patterns de correction",
        text: "Quelle approche est la plus efficace pour corriger un test flaky ?",
        code: "// MAUVAIS: ajouter un sleep\nawait page.click('#load');\nawait page.waitForTimeout(3000); // sleep arbitraire\nexpect(await page.locator('.data').isVisible()).toBe(true);\n\n// BON: attendre la condition\nawait page.click('#load');\nawait expect(page.locator('.data')).toBeVisible();",
        options: [
          "Ajouter des sleep de plus en plus longs jusqu'a ce que le test passe",
          "Remplacer les attentes arbitraires par des attentes conditionnelles (auto-retry assertions, waitForSelector, waitForResponse), isoler l'etat, et mocker les sources de non-determinisme",
          "Supprimer le test flaky et le remplacer par un test manuel",
          "Desactiver les tests flaky avec .skip et les oublier"
        ],
        answer: 1,
        explanation: "Les sleep sont fragiles (trop courts = flaky, trop longs = lents). Les vraies solutions : 1) Assertions auto-retrying (toBeVisible, toHaveText), 2) Attentes explicites (waitForResponse, waitForSelector), 3) Isolation de l'etat (reset entre tests), 4) Mock des sources aleatoires (Date, Math.random)."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
