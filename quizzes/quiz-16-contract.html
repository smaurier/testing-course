<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 16 — Contract testing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 16 — Contract testing</h1>
    <p class="subtitle">Pact, consumer-driven contracts, Zod et breaking changes</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Pourquoi le contract testing",
        text: "Quel probleme le contract testing resout-il ?",
        code: "// Frontend attend:\n// GET /api/users/1 -> { id: 1, name: 'Alice', email: '...' }\n\n// Backend change sans prevenir:\n// GET /api/users/1 -> { id: 1, fullName: 'Alice', mail: '...' }\n// name -> fullName, email -> mail = BREAKING CHANGE!",
        options: [
          "Il remplace les tests E2E complets",
          "Il detecte les breaking changes d'API entre services (frontend/backend, microservices) AVANT le deploiement, sans necessiter que tous les services soient lances ensemble",
          "Il teste les performances des API",
          "Il genere automatiquement la documentation d'API"
        ],
        answer: 1,
        explanation: "Le contract testing verifie que le 'contrat' (shape des requetes/reponses) entre un consumer (frontend) et un provider (backend) est respecte. Il detecte les incompatibilites avant le deploiement, sans integration E2E lourde."
      },
      {
        label: "Question 2 — Consumer-driven contracts",
        text: "Que signifie 'consumer-driven' dans Pact ?",
        code: "// 1. Le CONSUMER (frontend) ecrit ses attentes\nconst pact = new PactV3({ consumer: 'WebApp', provider: 'UserAPI' });\npact.addInteraction({\n  uponReceiving: 'a request for user 1',\n  withRequest: { method: 'GET', path: '/api/users/1' },\n  willRespondWith: {\n    status: 200,\n    body: { id: 1, name: string(), email: string() }\n  }\n});\n\n// 2. Le contrat genere est verifie contre le PROVIDER reel",
        options: [
          "Le consumer (frontend) definit ses attentes (ce dont il a besoin de l'API), et le provider (backend) verifie qu'il les satisfait",
          "Le provider impose son contrat au consumer",
          "Consumer et provider ecrivent le contrat ensemble en meme temps",
          "Le contrat est genere automatiquement depuis la documentation"
        ],
        answer: 0,
        explanation: "En consumer-driven : le consumer exprime ses besoins (quels champs, quels types il utilise). Le provider ne doit pas casser ces attentes. Avantage : le provider peut ajouter de nouveaux champs librement, tant qu'il ne supprime/modifie pas ceux utilises par les consumers."
      },
      {
        label: "Question 3 — Zod pour la validation",
        text: "Comment Zod peut-il servir de contract testing leger ?",
        code: "import { z } from 'zod';\n\nconst UserSchema = z.object({\n  id: z.number(),\n  name: z.string().min(1),\n  email: z.string().email(),\n  role: z.enum(['admin', 'user']),\n});\n\ntype User = z.infer<typeof UserSchema>;\n\n// Dans les tests ou le code\nconst response = await fetch('/api/users/1');\nconst data = UserSchema.parse(await response.json());\n// Throw si la response ne matche pas le schema!",
        options: [
          "Zod ne peut valider que les formulaires cote client",
          "Zod definit un schema type-safe qui valide les reponses API a l'execution, detectant les ecarts entre le contrat attendu et la realite — plus leger que Pact pour les equipes fullstack",
          "Zod remplace completement Pact dans tous les cas",
          "Zod est un outil de test unitaire"
        ],
        answer: 1,
        explanation: "Zod combine validation runtime + inference TypeScript. En test d'integration, on parse les reponses API avec le schema : si le backend change la structure, le parse echoue immediatement. Plus simple que Pact pour les monorepos ou equipes fullstack, mais sans le workflow de broker."
      },
      {
        label: "Question 4 — Breaking changes",
        text: "Lequel de ces changements d'API est un breaking change ?",
        code: "// API actuelle\nGET /api/users/1\n{ \"id\": 1, \"name\": \"Alice\", \"email\": \"alice@ex.com\" }\n\n// Changement A: ajouter un champ\n{ \"id\": 1, \"name\": \"Alice\", \"email\": \"alice@ex.com\", \"avatar\": \"url\" }\n\n// Changement B: renommer un champ\n{ \"id\": 1, \"fullName\": \"Alice\", \"email\": \"alice@ex.com\" }\n\n// Changement C: ajouter un endpoint\nGET /api/users/1/profile",
        options: [
          "Changement A (ajout de champ) — le consumer ne sait pas gerer de nouveaux champs",
          "Changement B (renommer name en fullName) — les consumers qui lisent 'name' recevront undefined, cassant leur fonctionnement",
          "Changement C (nouvel endpoint) — les consumers doivent migrer",
          "Aucun n'est un breaking change"
        ],
        answer: 1,
        explanation: "Renommer/supprimer un champ est un breaking change : les consumers qui utilisent 'name' ne le trouvent plus. Ajouter un champ (A) ou un endpoint (C) sont des changements backward-compatible. Regle : ne jamais renommer/supprimer, plutot deprecier et ajouter."
      },
      {
        label: "Question 5 — Pact Broker",
        text: "Quel est le role du Pact Broker dans le workflow ?",
        code: "// Workflow Pact\n// 1. Consumer genere un contrat (pact file)\n// 2. Publie sur le Pact Broker\n// 3. Provider telecharge et verifie\n// 4. Broker enregistre le resultat\n// 5. can-i-deploy verifie la compatibilite avant deploy",
        options: [
          "Le Broker execute les tests automatiquement",
          "Le Broker stocke les contrats, suit les versions, et permet a 'can-i-deploy' de verifier si un deploy est safe en fonction de la compatibilite des contrats verifies",
          "Le Broker est un reverse proxy pour les API",
          "Le Broker est optionnel et n'apporte aucune valeur"
        ],
        answer: 1,
        explanation: "Le Pact Broker centralise les contrats, les resultats de verification et les versions. L'outil 'can-i-deploy' interroge le Broker avant chaque deploiement pour verifier que la version du service est compatible avec tous ses consumers/providers en production."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
