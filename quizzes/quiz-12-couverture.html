<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Couverture de code</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Couverture de code</h1>
    <p class="subtitle">Types de couverture, mutation testing, Stryker et seuils</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Types de couverture",
        text: "Quelle est la difference entre couverture de lignes (line), de branches (branch) et de fonctions ?",
        code: "function getLabel(score: number): string {\n  if (score >= 90) return 'A';      // branche 1\n  else if (score >= 70) return 'B';  // branche 2\n  else return 'C';                   // branche 3\n}\n\n// Test: getLabel(95) -> couvre la ligne 2 et branche 1\n// Lines: 60%, Branches: 33%, Functions: 100%",
        options: [
          "Il n'y a aucune difference, les trois metriques sont identiques",
          "Line = lignes executees, Branch = chemins conditionnels (if/else/switch) pris, Function = fonctions appelees au moins une fois",
          "Branch est toujours superieur a line coverage",
          "Function coverage est la seule metrique fiable"
        ],
        answer: 1,
        explanation: "Line coverage mesure les lignes executees. Branch coverage mesure les branches conditionnelles (if true ET false). Function coverage verifie si chaque fonction a ete appelee. Branch coverage est souvent le plus revelateur car il identifie les chemins non testes."
      },
      {
        label: "Question 2 — Mutation testing",
        text: "Qu'est-ce que le mutation testing et que mesure-t-il ?",
        code: "// Code original\nfunction isAdult(age: number): boolean {\n  return age >= 18;\n}\n\n// Mutant 1: change >= en >\nfunction isAdult(age: number): boolean {\n  return age > 18;  // MUTANT: >= -> >\n}\n\n// Si les tests passent encore -> mutant SURVIT\n// = les tests ne detectent pas le changement!",
        options: [
          "C'est une technique pour generer des tests automatiquement",
          "Il introduit des petites modifications (mutants) dans le code et verifie que les tests les detectent — les mutants survivants revelent les faiblesses des tests",
          "Il mesure la vitesse d'execution des tests",
          "Il modifie les tests pour verifier le code"
        ],
        answer: 1,
        explanation: "Le mutation testing injecte des defauts (changer >=  en >, supprimer un return, inverser une condition) et verifie que les tests echouent. Un mutant qui survit = un scenario non teste. Le mutation score (% de mutants tues) est un indicateur de qualite des tests bien superieur au coverage."
      },
      {
        label: "Question 3 — Stryker",
        text: "Quel est le role de Stryker dans l'ecosysteme de test ?",
        code: "// stryker.config.json\n{\n  \"mutate\": [\"src/**/*.ts\", \"!src/**/*.test.ts\"],\n  \"testRunner\": \"vitest\",\n  \"reporters\": [\"html\", \"clear-text\"],\n  \"thresholds\": { \"high\": 80, \"low\": 60, \"break\": 50 }\n}",
        options: [
          "Stryker est un framework de test unitaire comme Vitest",
          "Stryker est un outil de mutation testing qui genere des mutants dans le code source et execute les tests pour mesurer leur efficacite a detecter les bugs",
          "Stryker est un linter pour les fichiers de test",
          "Stryker est un outil de couverture de code classique"
        ],
        answer: 1,
        explanation: "Stryker Mutator est l'outil de mutation testing le plus populaire en JavaScript/TypeScript. Il genere des mutants, execute les tests, et produit un rapport indiquant quels mutants ont survecu (= faiblesses des tests). Supporte Vitest, Jest, Mocha."
      },
      {
        label: "Question 4 — Seuils de couverture",
        text: "Comment configurer et appliquer des seuils de couverture dans Vitest ?",
        code: "// vitest.config.ts\nexport default defineConfig({\n  test: {\n    coverage: {\n      provider: 'v8',\n      thresholds: {\n        lines: 80,\n        branches: 75,\n        functions: 80,\n        statements: 80,\n      },\n    },\n  },\n});",
        options: [
          "Les seuils sont uniquement informatifs et n'affectent pas la CI",
          "Les seuils definissent un minimum de couverture requis — si non atteint, vitest --coverage echoue (exit code 1), bloquant la CI",
          "Les seuils augmentent automatiquement la couverture",
          "On ne peut configurer qu'un seul type de seuil"
        ],
        answer: 1,
        explanation: "Les thresholds definissent des minimums pour chaque metrique. Si la couverture tombe en dessous, la commande echoue, bloquant le merge en CI. Choix pragmatique : 70-80% est un bon compromis. Eviter 100% qui pousse a ecrire des tests sans valeur."
      },
      {
        label: "Question 5 — Limites de la couverture",
        text: "Pourquoi la couverture de code seule est-elle insuffisante pour evaluer la qualite des tests ?",
        code: "// 100% coverage, 0% de valeur\ntest('covers all lines', () => {\n  const result = processOrder(mockOrder);\n  // Pas d'assertion ! Le test 'couvre' le code\n  // mais ne verifie RIEN.\n});",
        options: [
          "La couverture est toujours suffisante si elle atteint 100%",
          "La couverture mesure le code execute, pas la qualite des assertions — du code peut etre 'couvert' sans qu'aucun comportement ne soit verifie",
          "La couverture ne fonctionne pas avec TypeScript",
          "Les outils de couverture sont trop imprecis pour etre utiles"
        ],
        answer: 1,
        explanation: "La couverture repond a 'ce code a-t-il ete execute ?' pas 'ce code a-t-il ete correctement verifie ?'. Un test sans assertion couvre le code mais ne detecte aucun bug. Le mutation testing comble ce manque en verifiant que les tests detectent reellement les erreurs."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
