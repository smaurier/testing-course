<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 19 — Tests d'accessibilite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 19 — Tests d'accessibilite</h1>
    <p class="subtitle">ESLint a11y, jest-axe / vitest-axe, Playwright + axe-core, Lighthouse CI, CI/CD</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Linting a11y avec ESLint",
        text: "Quel est le role des plugins ESLint comme eslint-plugin-jsx-a11y ou @angular-eslint/template dans une strategie de tests d'accessibilite ?",
        code: "// .eslintrc.json (React)\n{\n  \"extends\": [\"plugin:jsx-a11y/recommended\"],\n  \"rules\": {\n    \"jsx-a11y/alt-text\": \"error\",\n    \"jsx-a11y/anchor-has-content\": \"error\",\n    \"jsx-a11y/no-autofocus\": \"warn\"\n  }\n}",
        options: [
          "Ils remplacent completement les tests automatises d'accessibilite comme axe-core",
          "Ils detectent statiquement les erreurs a11y courantes (alt manquant, role invalide, label absent) des l'ecriture du code, avant meme l'execution",
          "Ils ne servent qu'a formatter le HTML et n'ont aucun rapport avec l'accessibilite",
          "Ils ne fonctionnent que dans les projets Angular et sont inutiles pour React ou Vue"
        ],
        answer: 1,
        explanation: "Les plugins ESLint a11y effectuent une analyse statique du code source (JSX, templates Angular/Vue). Ils detectent des problemes comme les images sans alt, les elements interactifs sans label, ou les roles ARIA invalides. C'est la premiere ligne de defense : rapide, sans execution, integree a l'editeur. Mais ils ne remplacent pas les tests dynamiques (axe-core) qui analysent le DOM rendu."
      },
      {
        label: "Question 2 — jest-axe / vitest-axe",
        text: "Que fait ce test unitaire d'accessibilite avec vitest-axe ?",
        code: "import { axe, toHaveNoViolations } from 'vitest-axe';\nimport { render } from '@testing-library/vue';\nimport LoginForm from './LoginForm.vue';\n\nexpect.extend(toHaveNoViolations);\n\ntest('le formulaire de connexion est accessible', async () => {\n  const { container } = render(LoginForm);\n  const results = await axe(container);\n  expect(results).toHaveNoViolations();\n});",
        options: [
          "Il verifie que le formulaire se soumet correctement avec des identifiants valides",
          "Il rend le composant dans un DOM virtuel, puis axe-core analyse le HTML genere pour detecter les violations WCAG (labels manquants, contraste, structure heading, roles ARIA)",
          "Il teste uniquement le rendu visuel du formulaire en comparant des captures d'ecran",
          "Il envoie le HTML a un serveur externe qui valide manuellement l'accessibilite"
        ],
        answer: 1,
        explanation: "vitest-axe (et jest-axe) integrent le moteur axe-core dans les tests unitaires. Le composant est rendu via Testing Library, puis axe-core parcourt le DOM genere pour detecter les violations WCAG au niveau A et AA : labels absents, mauvais roles ARIA, structure de headings incorrecte, etc. C'est rapide (~50ms par composant) et ideal pour le TDD a11y."
      },
      {
        label: "Question 3 — Playwright + @axe-core/playwright",
        text: "Quel avantage apporte @axe-core/playwright par rapport a vitest-axe pour les tests d'accessibilite ?",
        code: "import { test, expect } from '@playwright/test';\nimport AxeBuilder from '@axe-core/playwright';\n\ntest('page d\\'accueil accessible', async ({ page }) => {\n  await page.goto('/');\n  const results = await new AxeBuilder({ page })\n    .withTags(['wcag2a', 'wcag2aa'])\n    .exclude('#third-party-widget')\n    .analyze();\n  expect(results.violations).toEqual([]);\n});",
        options: [
          "Il est plus rapide car il n'utilise pas de navigateur",
          "Il teste l'accessibilite sur la page complete rendue dans un vrai navigateur, incluant CSS, JavaScript dynamique, composants tiers et etats interactifs — ce que le DOM virtuel ne peut pas verifier",
          "Il ne detecte que les erreurs de contraste de couleurs",
          "Il remplace ESLint et vitest-axe, rendant les autres outils inutiles"
        ],
        answer: 1,
        explanation: "@axe-core/playwright execute axe-core dans un vrai navigateur (Chromium, Firefox, WebKit). Il analyse la page complete avec CSS applique, JS execute et composants tiers charges. On peut filtrer par tags WCAG (wcag2a, wcag2aa, best-practice) et exclure des zones. C'est complementaire aux tests unitaires : les tests unitaires sont rapides mais partiels, les tests e2e sont plus lents mais plus realistes."
      },
      {
        label: "Question 4 — Lighthouse CI",
        text: "Comment Lighthouse CI contribue-t-il aux tests d'accessibilite dans un pipeline CI/CD ?",
        code: "// lighthouserc.js\nmodule.exports = {\n  ci: {\n    collect: {\n      url: ['http://localhost:3000/', 'http://localhost:3000/contact'],\n      numberOfRuns: 3,\n    },\n    assert: {\n      assertions: {\n        'categories:accessibility': ['error', { minScore: 0.9 }],\n        'categories:performance': ['warn', { minScore: 0.8 }],\n      },\n    },\n    upload: {\n      target: 'temporary-public-storage',\n    },\n  },\n};",
        options: [
          "Lighthouse CI ne mesure que la performance, il n'a aucun rapport avec l'accessibilite",
          "Il execute Lighthouse en mode headless sur les URLs specifiees, verifie que le score a11y depasse un seuil minimum (ici 90%), et fait echouer le build si le seuil n'est pas atteint",
          "Il remplace completement axe-core et ne necessite aucun autre outil a11y",
          "Il envoie un email a l'equipe avec des suggestions d'amelioration mais ne bloque jamais le pipeline"
        ],
        answer: 1,
        explanation: "Lighthouse CI execute plusieurs audits (performance, a11y, SEO, best practices) dans un navigateur headless. La section assert definit des seuils : ici, un score a11y < 90% fait echouer le build (error). Les resultats sont uploades pour comparaison historique. C'est un filet de securite complementaire a axe-core, car Lighthouse inclut aussi des heuristiques supplementaires."
      },
      {
        label: "Question 5 — Strategie a11y en CI/CD",
        text: "Quelle est la meilleure strategie pour integrer les tests d'accessibilite dans un pipeline CI/CD ?",
        code: "# .github/workflows/a11y.yml\njobs:\n  a11y-lint:\n    steps:\n      - run: npx eslint --ext .vue,.tsx src/\n  a11y-unit:\n    steps:\n      - run: npx vitest run --reporter=verbose\n  a11y-e2e:\n    needs: [a11y-lint, a11y-unit]\n    steps:\n      - run: npx playwright test tests/a11y/\n  lighthouse:\n    needs: [a11y-e2e]\n    steps:\n      - run: npx @lhci/cli autorun",
        options: [
          "Un seul job Lighthouse suffit, les autres etapes sont superflues",
          "On ne teste l'accessibilite qu'en pre-production, jamais en CI",
          "Une approche en couches : linting statique (rapide, chaque PR) → tests unitaires axe sur composants → tests e2e axe sur pages completes → Lighthouse CI pour le score global, chaque couche attrapant des problemes differents",
          "Il faut uniquement des tests manuels avec un lecteur d'ecran, les tests automatises sont inutiles"
        ],
        answer: 2,
        explanation: "La strategie optimale est une pyramide de tests a11y : 1) ESLint a11y (statique, instantane, bloque la PR), 2) vitest-axe (composants isoles, rapide), 3) Playwright + axe-core (pages completes, navigateur reel), 4) Lighthouse CI (score global, tendances). Les tests automatises attrapent ~30-40% des problemes WCAG. Les audits manuels (lecteur d'ecran, navigation clavier) restent indispensables pour les 60% restants."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
