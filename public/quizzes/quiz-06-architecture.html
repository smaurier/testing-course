<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 06 — Architecture testable</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 06 — Architecture testable</h1>
    <p class="subtitle">Injection de dependances, fonctions pures, SOLID et architecture hexagonale</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Injection de dependances",
        text: "Pourquoi l'injection de dependances facilite-t-elle les tests ?",
        code: "// DIFFICILE a tester\nclass OrderService {\n  async placeOrder(order) {\n    const db = new PostgresDB(); // dependance codee en dur\n    await db.save(order);\n  }\n}\n\n// FACILE a tester\nclass OrderService {\n  constructor(private db: Database) {} // injection\n  async placeOrder(order) {\n    await this.db.save(order);\n  }\n}",
        options: [
          "L'injection de dependances rend le code plus rapide a l'execution",
          "Elle permet de remplacer les dependances reelles par des test doubles (mocks, stubs) sans modifier le code de production",
          "Elle est obligatoire uniquement pour les tests E2E",
          "Elle complique les tests car il faut creer plus d'objets"
        ],
        answer: 1,
        explanation: "En injectant les dependances via le constructeur ou les parametres, on peut passer un fake/mock en test (ex: InMemoryDB) au lieu de la vraie base. Le code de production reste identique, seule la dependance injectee change."
      },
      {
        label: "Question 2 — Fonctions pures",
        text: "Pourquoi les fonctions pures sont-elles les plus faciles a tester ?",
        code: "// Pure: meme entree -> meme sortie, pas d'effet de bord\nfunction calculateTax(price: number, rate: number): number {\n  return price * rate;\n}\n\n// Impure: depend de l'etat externe\nfunction calculateTax(price: number): number {\n  const rate = getTaxRateFromDB(); // effet de bord\n  return price * rate;\n}",
        options: [
          "Les fonctions pures sont plus rapides a executer",
          "Elles n'ont pas d'effets de bord et retournent toujours le meme resultat pour les memes entrees, rendant les tests deterministes sans aucun mock",
          "Elles ne peuvent pas echouer donc les tests sont inutiles",
          "Les fonctions pures ne sont possibles qu'en programmation fonctionnelle"
        ],
        answer: 1,
        explanation: "Une fonction pure est deterministe (meme input = meme output) et n'a pas d'effets de bord. Pas besoin de mock, pas de setup complexe, pas de teardown. On teste simplement input -> output. Maximiser les fonctions pures rend le code naturellement testable."
      },
      {
        label: "Question 3 — Principe de responsabilite unique",
        text: "Comment le SRP (Single Responsibility Principle) aide-t-il la testabilite ?",
        code: "// Violation SRP: fait trop de choses\nclass UserManager {\n  validate(user) { /* ... */ }\n  hashPassword(pwd) { /* ... */ }\n  saveToDb(user) { /* ... */ }\n  sendEmail(user) { /* ... */ }\n}\n\n// SRP respecte\nclass UserValidator { validate(user) { /* ... */ } }\nclass PasswordHasher { hash(pwd) { /* ... */ } }\nclass UserRepository { save(user) { /* ... */ } }\nclass EmailService { send(to, msg) { /* ... */ } }",
        options: [
          "Le SRP n'a aucun impact sur les tests",
          "Chaque classe/fonction a une seule raison de changer, donc les tests sont plus petits, plus cibles et independants — un changement dans le hashing ne casse pas les tests d'email",
          "Le SRP augmente le nombre de classes donc complique les tests",
          "Le SRP s'applique uniquement au code backend"
        ],
        answer: 1,
        explanation: "Avec le SRP, chaque unite a un perimetre clair et reduit. Les tests sont petits et cibles. Si le hashing change, seuls les tests de PasswordHasher sont impactes. Sans SRP, un changement peut casser des dizaines de tests sans rapport."
      },
      {
        label: "Question 4 — Architecture hexagonale",
        text: "Comment l'architecture hexagonale (ports & adapters) ameliore-t-elle la testabilite ?",
        code: "// Port (interface)\ninterface UserRepository {\n  findById(id: string): Promise<User>;\n  save(user: User): Promise<void>;\n}\n\n// Adapter production\nclass PostgresUserRepo implements UserRepository { /* ... */ }\n\n// Adapter test\nclass InMemoryUserRepo implements UserRepository {\n  private users = new Map<string, User>();\n  async findById(id) { return this.users.get(id); }\n  async save(user) { this.users.set(user.id, user); }\n}",
        options: [
          "Elle n'a aucun avantage pour les tests",
          "Le domaine metier depend d'interfaces (ports), pas d'implementations concretes, permettant de substituer les adapters reels par des adapters in-memory pour les tests",
          "Elle oblige a utiliser une base de donnees pour chaque test",
          "Elle est incompatible avec les tests unitaires"
        ],
        answer: 1,
        explanation: "L'architecture hexagonale isole le domaine metier derriere des ports (interfaces). En test, on injecte des adapters simples (in-memory) au lieu des vrais (Postgres, API). Le domaine est teste en isolation, rapidement et de maniere deterministe."
      },
      {
        label: "Question 5 — Repository pattern",
        text: "Quel avantage principal le pattern Repository apporte-t-il aux tests ?",
        code: "// Le service ne connait que l'interface\nclass ArticleService {\n  constructor(private repo: ArticleRepository) {}\n\n  async publish(id: string) {\n    const article = await this.repo.findById(id);\n    article.status = 'published';\n    await this.repo.save(article);\n  }\n}\n\n// En test: pas besoin de DB\nconst repo = new InMemoryArticleRepo();\nconst service = new ArticleService(repo);",
        options: [
          "Il oblige a utiliser un ORM specifique",
          "Il abstrait l'acces aux donnees derriere une interface, permettant de tester la logique metier sans base de donnees reelle",
          "Il accelere les requetes SQL",
          "Il est uniquement utile pour les tests E2E"
        ],
        answer: 1,
        explanation: "Le Repository encapsule l'acces aux donnees derriere une interface. En test, un InMemoryRepository (simple Map) remplace le vrai repository sans base de donnees. Les tests sont rapides (pas d'I/O), deterministes et faciles a setup."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
