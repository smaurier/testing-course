<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 08 — MSW</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 08 — MSW</h1>
    <p class="subtitle">Mock Service Worker, handlers, server lifecycle et simulation d'erreurs</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — MSW vs vi.mock",
        text: "Quel avantage principal MSW offre-t-il par rapport a vi.mock() pour les tests d'API ?",
        code: "// vi.mock: mock au niveau module\nvi.mock('./api', () => ({\n  fetchUsers: vi.fn().mockResolvedValue([...])\n}));\n\n// MSW: intercepte au niveau reseau\nhttp.get('/api/users', () => {\n  return HttpResponse.json([...])\n});",
        options: [
          "MSW est plus rapide que vi.mock",
          "MSW intercepte au niveau reseau (fetch/XHR), testant le vrai code de l'application (URL, headers, serialisation) sans modifier les imports",
          "MSW remplace completement les tests unitaires",
          "MSW ne fonctionne qu'avec REST, pas GraphQL"
        ],
        answer: 1,
        explanation: "MSW intercepte les requetes au niveau reseau, ce qui signifie que le code applicatif (fetch, axios, URL construction, headers) est reellement execute. vi.mock court-circuite l'import, ne testant pas la couche HTTP reelle. MSW supporte REST et GraphQL."
      },
      {
        label: "Question 2 — Handlers MSW",
        text: "Que fait ce handler MSW ?",
        code: "import { http, HttpResponse } from 'msw';\n\nexport const handlers = [\n  http.get('/api/users/:id', ({ params }) => {\n    if (params.id === '999') {\n      return new HttpResponse(null, { status: 404 });\n    }\n    return HttpResponse.json({ id: params.id, name: 'Alice' });\n  }),\n];",
        options: [
          "Il cree un vrai serveur HTTP sur le port 3000",
          "Il intercepte les GET vers /api/users/:id, retourne 404 pour l'ID 999 et un JSON utilisateur pour les autres",
          "Il modifie la base de donnees pour l'utilisateur 999",
          "Il ne fonctionne qu'en mode navigateur, pas en Node.js"
        ],
        answer: 1,
        explanation: "Les handlers MSW definissent des intercepteurs de requetes. Ce handler gere les GET sur /api/users/:id avec un parametre dynamique. Il simule un 404 pour l'ID 999 et retourne des donnees pour les autres. Les handlers peuvent etre partages entre Node.js et navigateur."
      },
      {
        label: "Question 3 — Server lifecycle",
        text: "Pourquoi appeler server.resetHandlers() dans afterEach ?",
        code: "const server = setupServer(...handlers);\n\nbeforeAll(() => server.listen());\nafterEach(() => server.resetHandlers());\nafterAll(() => server.close());\n\ntest('handles error', () => {\n  server.use(\n    http.get('/api/users', () => {\n      return new HttpResponse(null, { status: 500 });\n    })\n  );\n  // ...\n});",
        options: [
          "Pour fermer le serveur entre chaque test",
          "Pour supprimer les handlers ajoutes par server.use() dans un test specifique, retablissant les handlers par defaut et evitant la pollution entre tests",
          "Pour redemarrer le serveur HTTP a chaque test",
          "C'est optionnel et n'affecte pas les tests"
        ],
        answer: 1,
        explanation: "server.use() ajoute des handlers temporaires (pour un test specifique, ex: simuler une erreur 500). resetHandlers() les supprime apres chaque test, retablissant les handlers par defaut. Sans cela, un handler d'erreur pourrait affecter le test suivant."
      },
      {
        label: "Question 4 — Simulation d'erreurs",
        text: "Comment MSW permet-il de tester les cas d'erreur reseau ?",
        code: "import { http, HttpResponse } from 'msw';\n\ntest('shows error on network failure', async () => {\n  server.use(\n    http.get('/api/data', () => {\n      return HttpResponse.error();\n    })\n  );\n\n  render(<DataLoader />);\n  await screen.findByText('Erreur de connexion');\n});",
        options: [
          "On debranche physiquement le cable reseau",
          "HttpResponse.error() simule une erreur reseau (comme un fetch qui rejette), permettant de tester les chemins d'erreur du code sans toucher au vrai reseau",
          "MSW ne supporte pas la simulation d'erreurs",
          "On modifie le code de production pour lancer des erreurs"
        ],
        answer: 1,
        explanation: "HttpResponse.error() simule un echec reseau (TypeError: Failed to fetch). On peut aussi retourner des status HTTP specifiques (400, 401, 500) ou des delais avec delay() pour tester les timeouts. Cela permet de tester tous les scenarios d'erreur de maniere deterministe."
      },
      {
        label: "Question 5 — MSW et tests d'integration",
        text: "Pourquoi MSW est-il particulierement adapte aux tests d'integration frontend ?",
        code: "test('user flow: search and display results', async () => {\n  // MSW intercepte /api/search?q=alice -> retourne des resultats\n  render(<SearchPage />);\n\n  await userEvent.type(screen.getByRole('searchbox'), 'alice');\n  await userEvent.click(screen.getByRole('button', { name: 'Rechercher' }));\n\n  const results = await screen.findAllByRole('listitem');\n  expect(results).toHaveLength(3);\n});",
        options: [
          "MSW est uniquement fait pour les tests unitaires",
          "Il permet de tester des flows complets (interaction utilisateur -> requete API -> rendu) avec un vrai cycle fetch/response, sans modifier le code de l'application",
          "Il remplace Playwright pour les tests E2E",
          "Il necessite un serveur backend en cours d'execution"
        ],
        answer: 1,
        explanation: "MSW brille en test d'integration : le composant est rendu normalement, l'utilisateur interagit, le code fait un vrai fetch (intercepte par MSW), et on verifie le rendu final. Aucune modification du code source, test realiste, et rapide car pas de vrai reseau."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion];
      const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${total}`;
      let html = `<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;
      if (q.code) html += `<pre><code>${q.code}</code></pre>`;
      html += `<ul class="options">`;
      q.options.forEach((opt, i) => { html += `<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`; });
      html += `</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      const btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = `<strong>Correct !</strong> ${q.explanation}`; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = `<strong>Incorrect.</strong> ${q.explanation}`; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = `<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
